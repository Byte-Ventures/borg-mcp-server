name: Verify and publish npm release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
      version: ${{ steps.release.outputs.version }}
    env:
      REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject immutable release reruns and repository npm configuration
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test ! -e .npmrc

      - name: Set up exact Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2

      - name: Verify immutable release source and readiness boundaries
        id: release
        shell: bash
        run: |
          set -euo pipefail
          test "$(node --version)" = "v22.22.2"
          test "${REPOSITORY_PRIVATE}" = "false"
          version="$(node -p "require('./package.json').version")"
          test "${GITHUB_EVENT_NAME}" = "push"
          test "${GITHUB_REF_TYPE}" = "tag"
          test "${GITHUB_REF_NAME}" = "v${version}"
          release_ref="refs/release-verification/${GITHUB_REF_NAME}"
          git fetch --no-tags origin "refs/tags/${GITHUB_REF_NAME}:${release_ref}"
          test "$(git cat-file -t "${release_ref}")" = "tag"
          release_commit="$(git rev-parse "${release_ref}^{commit}")"
          test "$(git rev-parse HEAD)" = "${release_commit}"
          test "${release_commit}" = "${GITHUB_SHA}"
          git fetch --no-tags origin refs/heads/main:refs/release-verification/main
          git merge-base --is-ancestor "${release_commit}" refs/release-verification/main
          test "$(sha256sum LICENSE | cut -d ' ' -f1)" = "9535abd9881dc5af88523e24e0bed77df8dddd0f255bb74710533ac71140d2a1"
          test -s README.md
          test -s CONTRIBUTING.md
          test -s SECURITY.md
          test -s LICENSE
          node -e 'const p=require("./package.json");if(p.name!=="borgmcp-server"||p.private!==false||p.version==="0.0.0"||p.license!=="SEE LICENSE IN LICENSE")process.exit(1)'
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify source lock before dependency installation
        run: node scripts/verify-source-lock.mjs

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --registry=https://registry.npmjs.org

      - name: Audit locked dependency tree
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org

      - name: Check, test, and build once
        run: npm run check

      - name: Build exact release tarball once
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          npm pack --ignore-scripts --json --pack-destination release > release/pack-result.json
          node -e 'const fs=require("node:fs");const [result]=JSON.parse(fs.readFileSync("release/pack-result.json","utf8"));fs.appendFileSync(process.env.GITHUB_OUTPUT,`tarball=${result.filename}\n`);'

      - name: Verify exact release tarball once
        run: node scripts/verify-packed-artifact.mjs "release/${{ steps.pack.outputs.tarball }}" > release/artifact-report.json

      - name: Exercise exact tarball once
        run: node scripts/exercise-packed-artifact.mjs "./release/${{ steps.pack.outputs.tarball }}"

      - name: Upload same-run release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-release-${{ steps.release.outputs.version }}
          path: |
            release/${{ steps.pack.outputs.tarball }}
            release/artifact-report.json
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/borgmcp-server/v/${{ needs.verify.outputs.version }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out reviewed release helpers
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up exact Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2

      - name: Set up Trusted Publishing npm
        shell: bash
        run: |
          set -euo pipefail
          npm_prefix="${RUNNER_TEMP}/npm-11.18.0"
          bootstrap_userconfig="${RUNNER_TEMP}/npm-bootstrap.npmrc"
          bootstrap_cache="${RUNNER_TEMP}/npm-bootstrap-cache"
          printf '%s\n' 'registry=https://registry.npmjs.org/' > "${bootstrap_userconfig}"
          NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" NPM_CONFIG_CACHE="${bootstrap_cache}" \
            npm install --prefix "${npm_prefix}" --ignore-scripts --no-save \
            --registry=https://registry.npmjs.org npm@11.18.0
          exact_npm="${npm_prefix}/node_modules/.bin/npm"
          test "$(NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" "${exact_npm}" --version)" = "11.18.0"
          test "$(NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" "${exact_npm}" config get registry)" = "https://registry.npmjs.org/"
          echo "${npm_prefix}/node_modules/.bin" >> "${GITHUB_PATH}"
          echo "NPM_CONFIG_USERCONFIG=${bootstrap_userconfig}" >> "${GITHUB_ENV}"
          echo "NPM_CONFIG_CACHE=${bootstrap_cache}" >> "${GITHUB_ENV}"

      - name: Download same-run release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-release-${{ needs.verify.outputs.version }}
          path: release

      - name: Verify immutable version, package, and reviewed owner
        run: node scripts/verify-registry-release.mjs prepublish release/artifact-report.json
        env:
          EXPECTED_VERSION: ${{ needs.verify.outputs.version }}
          NPM_EXPECTED_OWNER: ${{ vars.NPM_EXPECTED_OWNER }}

      - name: Publish same-run tarball with Trusted Publishing provenance
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_ACTIONS}" = "true"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}"
          test -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}"
          test -z "${NODE_AUTH_TOKEN:-}"
          npm publish "./release/${{ needs.verify.outputs.tarball }}" --ignore-scripts --access public --provenance --registry=https://registry.npmjs.org
